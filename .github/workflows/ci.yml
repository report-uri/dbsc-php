name: CI

on:
  pull_request:
  push:
    branches: [master]

# Least privilege: the test job only needs to read the checked-out code. The default
# GITHUB_TOKEN is dropped to read-only so a compromised action can't push or open PRs.
permissions:
  contents: read

jobs:
  build:
    name: php-${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the floor (composer.json requires >=8.1) and current stable.
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      # Action versions are pinned to major tags and tracked by Dependabot
      # (.github/dependabot.yml), which raises PRs to bump them to exact SHAs.
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, json
          coverage: none
          tools: none
      - name: Lint sources
        run: |
          find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
          php -l _test/run-tests.php
          php -l _test/server.php
      - name: Run test harness
        run: php _test/run-tests.php

  # Stable aggregate check used as the required status check on the `master`
  # ruleset — its name does not change when the PHP matrix does.
  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "All PHP versions passed."
